<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Player | Verified</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        #status { font-size: 20px; color: #0f0; margin-bottom: 20px; text-transform: uppercase; }
        .btn { width: 100%; max-width: 300px; height: 100px; font-size: 30px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="status">IDLE</div>
    <div id="timer">00:00</div>
    <input type="file" id="fileInput" multiple onchange="loadFiles(this)">
    <button class="btn" id="armBtn" onclick="dispatch('BUTTON_CLICK')">ARM</button>

    <script>
        const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', FADING: 'FADING' };
        let currentState = State.IDLE;
        
        let player = new Audio();
        let playlist = [], currentIndex = 0, sleepMinutes = 12;
        let masterTimer, fadeInterval, graceTimer;

        // THE CENTRAL LOGIC (Strictly mapping to your table)
        function dispatch(event) {
            console.log(`State: ${currentState} | Event: ${event}`);
            
            switch (currentState) {
                case State.IDLE:
                    if (event === 'BUTTON_CLICK' || event === 'SHAKE') {
                        startSystem();
                        transition(State.PLAYING);
                    }
                    break;

                case State.PLAYING:
                    if (event === 'SHAKE') {
                        resetTimer(); // -> PLAYING
                    } else if (event === 'FACEDOWN') {
                        pauseAudio();
                        startGraceTimer(); // -> PAUSED
                        transition(State.PAUSED);
                    } else if (event === 'FADE_TIMEOUT') {
                        startFade(); // -> FADING
                        transition(State.FADING);
                    } else if (event === 'TRACK_END') {
                        nextTrack(); // -> PLAYING
                    }
                    // BUTTON_CLICK is IGNORED here per your table
                    break;

                case State.PAUSED:
                    if (event === 'BUTTON_CLICK') {
                        resumeAudio(); // -> PLAYING
                        transition(State.PLAYING);
                    } else if (event === 'SHAKE' || event === 'FACEUP') {
                        clearTimeout(graceTimer);
                        resumeAudio();
                        resetTimer(); // -> PLAYING
                        transition(State.PLAYING);
                    } else if (event === 'GRACE_EXPIRY') {
                        hardStop(); // -> IDLE
                        transition(State.IDLE);
                    }
                    break;

                case State.FADING:
                    if (event === 'BUTTON_CLICK') {
                        hardStop(); // -> IDLE
                        transition(State.IDLE);
                    } else if (event === 'SHAKE' || event === 'FACEUP') {
                        cancelFade();
                        resumeAudio();
                        resetTimer(); // -> PLAYING
                        transition(State.PLAYING);
                    } else if (event === 'FACEDOWN') {
                        cancelFade();
                        pauseAudio();
                        startGraceTimer(); // -> PAUSED
                        transition(State.PAUSED);
                    } else if (event === 'FADE_COMPLETION') {
                        pauseAudio(); // -> PAUSED
                        transition(State.PAUSED);
                    } else if (event === 'TRACK_END') {
                        nextTrack(); // -> PLAYING
                    }
                    break;
            }
        }

        // TRANSITION HELPER
        function transition(newState) {
            currentState = newState;
            document.getElementById('status').innerText = currentState;
        }

        // ACTION FUNCTIONS
        function startSystem() {
            if (playlist.length === 0) return alert("Files?");
            player.src = URL.createObjectURL(playlist[currentIndex]);
            player.play();
            resetTimer();
        }

        function resetTimer() {
            clearTimeout(masterTimer);
            masterTimer = setTimeout(() => dispatch('FADE_TIMEOUT'), (sleepMinutes * 60 * 1000) - 30000);
        }

        function pauseAudio() { player.pause(); }
        function resumeAudio() { player.play(); }
        function hardStop() { player.pause(); player.currentTime = 0; clearTimeout(masterTimer); }
        
        function startFade() {
            let steps = 30;
            fadeInterval = setInterval(() => {
                steps--;
                player.volume = Math.max(0, steps / 30);
                if (steps <= 0) { clearInterval(fadeInterval); dispatch('FADE_COMPLETION'); }
            }, 1000);
        }

        function cancelFade() { clearInterval(fadeInterval); player.volume = 1.0; }
        function startGraceTimer() { graceTimer = setTimeout(() => dispatch('GRACE_EXPIRY'), 300000); }
        
        function nextTrack() {
            currentIndex++;
            if (currentIndex < playlist.length) {
                player.src = URL.createObjectURL(playlist[currentIndex]);
                player.play();
            } else {
                transition(State.IDLE);
            }
        }

        // SENSORS
        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (acc.z < -8) dispatch('FACEDOWN');
            else if (acc.z > 8) dispatch('FACEUP');
            else if (Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z) > 18) dispatch('SHAKE');
        });
        
        player.onended = () => dispatch('TRACK_END');
        function loadFiles(input) { playlist = Array.from(input.files); }
    </script>
</body>
</html>

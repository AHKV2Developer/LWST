<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Player v2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #d0d0d0; text-align: center; padding: 10px; margin: 0; overflow: hidden; }
        #status { font-size: 13px; color: #888; margin: 5px 0; letter-spacing: 1px; height: 1.2em; text-transform: uppercase; }
        #timeLeft { font-size: 48px; font-family: monospace; color: #00ff00; margin: 2px 0; }
        .val { font-size: 40px; font-weight: bold; color: #00ff00; }
        .adj-btn { width: 60px; height: 60px; font-size: 48px; border-radius: 50%; background: #222; color: white; border: 1px solid #444; margin: 5px 15px; padding: 0; display: inline-flex; align-items: center; justify-content: center; line-height: 1; vertical-align: middle; }
        
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .nav-btn { height: 50px; font-size: 20px; background: #1a1a1a; border: 1px solid #333; color: #aaa; border-radius: 8px; }
        
        #trackProgress { font-size: 18px; font-family: monospace; color: #aaa; margin: 10px 0; }
        .file-label { display: block; width: 90%; margin: 10px auto; padding: 15px; border: 1px dashed #444; border-radius: 12px; cursor: pointer; background: #111; color: #aaa; }
        
        .action-btn { display: none; width: 90%; height: 75px; font-size: 25px; border-radius: 12px; font-weight: bold; margin: 10px auto; border: none; }
        #armBtn { display: block; background: #1a3a1a; color: white; border: 2px solid #2a5a2a; }
        #stopBtn { background: #500; color: white; }
    </style>
</head>
<body>

    <div id="status">IDLE</div>
    <div id="timeLeft">00:00</div>

    <div style="display: flex; align-items: center; justify-content: center;">
        <button class="adj-btn" onclick="adjustTime(-0.1)">-</button>
        <span id="timeVal" class="val">0.5</span>
        <button class="adj-btn" onclick="adjustTime(0.1)">+</button>
    </div>

    <div class="nav-grid">
        <button class="nav-btn" onclick="seek(-600)">-10m</button>
        <button class="nav-btn" onclick="seek(-120)">-2m</button>
        <button class="nav-btn" onclick="seek(-15)">-15s</button>
        <button class="nav-btn" onclick="seek(15)">+15s</button>
        <button class="nav-btn" onclick="seek(120)">+2m</button>
        <button class="nav-btn" onclick="seek(600)">+10m</button>
    </div>

    <div id="trackProgress">0:00 / 0:00</div>
    <input type="file" id="fileInput" style="display:none" multiple onchange="handleFile(this)">
    <label for="fileInput" class="file-label" id="fileLabel">SELECT FILES</label>
    
    <button id="armBtn" class="action-btn" onclick="handleARM()">ARM</button>
    <button id="stopBtn" class="action-btn" onclick="handleTurnover()">PAUSE</button>

    <script>
        const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', FADING: 'FADING' };
        let currentState = State.IDLE;
        
        let player = new Audio();
        let playlist = [];
        let currentIndex = 0;
        let sleepMinutes = 0.5, targetEndTime, graceTimer, fadeInterval, uiInterval;
        let wakeLock = null;
        let lastSensorEvent = 0;

        function transitionTo(newState) {
            currentState = newState;
            document.getElementById('status').innerText = newState;
            updateUI();
        }

        function updateUI() {
            document.getElementById('armBtn').style.display = (currentState === State.IDLE || currentState === State.PAUSED) ? 'block' : 'none';
            document.getElementById('stopBtn').style.display = (currentState === State.PLAYING || currentState === State.FADING) ? 'block' : 'none';
        }

        function handleARM() {
            if (playlist.length === 0) return alert("Select files.");
            if (currentState === State.IDLE) {
                targetEndTime = Date.now() + (sleepMinutes * 60 * 1000);
                requestWakeLock();
                player.play();
                transitionTo(State.PLAYING);
            } else if (currentState === State.PAUSED) {
                clearTimeout(graceTimer);
                player.play();
                transitionTo(State.PLAYING);
            } else if (currentState === State.FADING) {
                // FADING + ARM -> Stop
                hardStop();
            }
        }

        function handleTurnover(isFaceDown) {
            if (isFaceDown) { // FaceDown (Pause)
                if (currentState === State.PLAYING || currentState === State.FADING) {
                    player.pause();
                    graceTimer = setTimeout(hardStop, 5 * 60 * 1000);
                    transitionTo(State.PAUSED);
                }
            } else { // FaceUp (Resume)
                if (currentState === State.PAUSED || currentState === State.FADING) {
                    clearTimeout(graceTimer);
                    player.play();
                    transitionTo(State.PLAYING);
                }
            }
        }

        function handleShake() {
            const now = Date.now();
            if (now - lastSensorEvent < 1000) return;
            lastSensorEvent = now;

            if (currentState === State.IDLE) {
                handleARM();
            } else if (currentState === State.PLAYING) {
                targetEndTime = now + (sleepMinutes * 60 * 1000);
            } else if (currentState === State.PAUSED) {
                clearTimeout(graceTimer);
                player.play();
                transitionTo(State.PLAYING);
            } else if (currentState === State.FADING) {
                clearInterval(fadeInterval);
                player.volume = 1.0;
                player.play();
                transitionTo(State.PLAYING);
            }
        }

        function hardStop() {
            player.pause();
            if (wakeLock) wakeLock.release();
            transitionTo(State.IDLE);
        }

        // --- SENSORS & SYSTEM ---
        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            // Shake
            if (Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z) > 18) handleShake();
            // Orientation
            if (acc.z < -8) handleTurnover(true);
            else if (acc.z > 8) handleTurnover(false);
        });

        setInterval(() => {
            if (currentState === State.PLAYING && Date.now() >= targetEndTime) {
                transitionTo(State.FADING);
                let vol = 1.0;
                fadeInterval = setInterval(() => {
                    vol -= 0.1;
                    if (vol <= 0) { player.pause(); transitionTo(State.PAUSED); clearInterval(fadeInterval); }
                    else player.volume = vol;
                }, 1500);
            }
            updateDisplay();
        }, 1000);

        // --- HELPERS ---
        function updateDisplay() {
            if(currentState === State.PLAYING || currentState === State.FADING) {
                const diff = Math.max(0, targetEndTime - Date.now());
                document.getElementById('timeLeft').innerText = `${Math.floor(diff/60000)}:${Math.floor((diff%60000)/1000).toString().padStart(2,'0')}`;
            }
            document.getElementById('trackProgress').innerText = `${Math.floor(player.currentTime/60)}:${Math.floor(player.currentTime%60).toString().padStart(2,'0')} / ...`;
        }
        
        async function requestWakeLock() {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
        
        function handleFile(input) { playlist = Array.from(input.files); player.src = URL.createObjectURL(playlist[0]); }
        function adjustTime(d) { sleepMinutes = Math.max(0.1, Math.round((sleepMinutes + d)*10)/10); document.getElementById('timeVal').innerText = sleepMinutes; }
        function seek(s) { player.currentTime += s; }
    </script>
</body>
</html>

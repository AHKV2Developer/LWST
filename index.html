<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Player LIGHT + Queue</title>
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #d0d0d0; text-align: center; padding: 10px; margin: 0; overflow: hidden; }
        #status { font-size: 13px; color: #888; margin: 5px 0; letter-spacing: 1px; height: 1.2em; text-transform: uppercase; }
        #timeLeft { font-size: 48px; font-family: monospace; color: #00ff00; margin: 2px 0; }
        .val { font-size: 40px; font-weight: bold; color: #00ff00; }
        .adj-btn { width: 60px; height: 60px; font-size: 48px; border-radius: 50%; background: #222; color: white; border: 1px solid #444; margin: 5px 15px; padding: 0; display: inline-flex; align-items: center; justify-content: center; line-height: 1; vertical-align: middle; }
        
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        .nav-btn { height: 50px; font-size: 20px; background: #1a1a1a; border: 1px solid #333; color: #aaa; border-radius: 8px; padding: 0; line-height: 1; }
        
        #trackProgress { font-size: 18px; font-family: monospace; color: #aaa; margin-bottom: 10px; }
        #fileInput { display: none; }
        .file-label { display: flex; align-items: center; justify-content: center; height: 75px; width: 90%; margin: 8px auto; padding: 0 15px; border: 1px dashed #444; border-radius: 12px; cursor: pointer; background: #111; font-size: 20px; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; box-sizing: border-box; }
        .file-label.loaded { border: 1px solid #2a5a2a; background: #0d1a0d; color: #fff; }
        
        .arm-btn { display: block; width: 90%; height: 75px; font-size: 25px; background: #1a3a1a; color: white; border: 2px solid #2a5a2a; border-radius: 12px; font-weight: bold; letter-spacing: 2px; margin: 8px auto; }
        .stop-btn { display: block; width: 90%; height: 75px; font-size: 20px; background: #500; color: white; border: none; border-radius: 12px; margin: 8px auto; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">IDLE</div>
    <div id="timeLeft">00:00</div>

    <div style="display: flex; align-items: center; justify-content: center;">
        <button class="adj-btn" onclick="adjustTime(-1)">-</button>
        <span id="timeVal" class="val">12</span>
        <button class="adj-btn" onclick="adjustTime(1)">+</button>
    </div>

    <div class="nav-grid">
        <button class="nav-btn" onclick="seek(-600)">-10m</button>
        <button class="nav-btn" onclick="seek(-120)">-2m</button>
        <button class="nav-btn" onclick="seek(-15)">-15s</button>
        <button class="nav-btn" onclick="seek(15)">+15s</button>
        <button class="nav-btn" onclick="seek(120)">+2m</button>
        <button class="nav-btn" onclick="seek(600)">+10m</button>
    </div>

    <div id="trackProgress">0:00 / 0:00</div>

    <input type="file" id="fileInput" accept="audio/*" multiple onchange="handleFile(this)">
    <label for="fileInput" class="file-label" id="fileLabel">SELECT FILES</label>
    
    <button id="startBtn" class="arm-btn" onclick="armSystemProxy()">ARM</button>
    <button id="stopBtn" class="stop-btn" onclick="stopSystemProxy()">STOP</button>

    <script>
        const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', FADING: 'FADING' };
        let currentState = State.IDLE;
        
        let player = new Audio();
        let playlist = [];
        let currentIndex = 0;
        let sleepMinutes = 12, targetEndTime, displayInterval, fadeInterval, masterTimer, graceTimer;
        let wakeLock = null;

        function updateUI() {
            document.getElementById('status').innerText = currentState;
        }

        function adjustTime(delta) {
            sleepMinutes = Math.max(1, sleepMinutes + delta);
            document.getElementById('timeVal').innerText = sleepMinutes;
        }

        function transitionTo(newState) {
            currentState = newState;
            updateUI();
            console.log("State changed to: " + newState);
        }

        function handleFile(input) {
            playlist = Array.from(input.files);
            if (playlist.length === 0) return;
            currentIndex = 0;
            loadTrack(currentIndex);
            const label = document.getElementById('fileLabel');
            label.innerText = playlist.length > 1 ? `${playlist.length} FILES LOADED` : playlist[0].name;
            label.classList.add('loaded');
        }

        function loadTrack(index) {
            if (index >= playlist.length) return;
            player.src = URL.createObjectURL(playlist[index]);
            player.load();
        }

        function armSystem() {
            if (playlist.length === 0) return alert("Select files.");
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().catch(console.error);
            }
            player.play();
            resetTimer();
            window.addEventListener('devicemotion', handleMotion);
            transitionTo(State.PLAYING);
            displayInterval = setInterval(updateDisplay, 1000);
        }

        function stopSystem() {
            player.pause();
            clearInterval(displayInterval);
            clearInterval(fadeInterval);
            clearTimeout(masterTimer);
            clearTimeout(graceTimer);
            window.removeEventListener('devicemotion', handleMotion);
            transitionTo(State.IDLE);
        }

        function forcePause() {
            player.pause();
            clearTimeout(masterTimer);
            clearTimeout(fadeInterval);
            graceTimer = setTimeout(stopSystem, 5 * 60 * 1000); 
            transitionTo(State.PAUSED);
        }

        function resumeSystem() {
            clearTimeout(graceTimer);
            player.play();
            if (currentState === State.PAUSED) resetTimer();
            transitionTo(State.PLAYING);
        }

        function handleMotion(e) {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (acc.z < -8 && (currentState === State.PLAYING || currentState === State.FADING)) {
                forcePause();
            } else if (acc.z > 8 && currentState === State.PAUSED) {
                resumeSystem();
            } else if (Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z) > 18) {
                if (currentState === State.PLAYING || currentState === State.FADING || currentState === State.PAUSED) {
                    resetTimer();
                    if (currentState === State.PAUSED) resumeSystem();
                }
            }
        }

        function resetTimer() {
            clearTimeout(masterTimer);
            player.volume = 1.0;
            targetEndTime = Date.now() + (sleepMinutes * 60 * 1000);
            masterTimer = setTimeout(startFade, (sleepMinutes * 60 * 1000) - 30000);
        }

        function startFade() {
            transitionTo(State.FADING);
            let steps = 30;
            fadeInterval = setInterval(() => {
                steps--;
                player.volume = Math.max(0, steps / 30);
                if (steps <= 0) {
                    clearInterval(fadeInterval);
                    stopSystem(); 
                    transitionTo(State.PAUSED);
                }
            }, 1000);
        }

        player.onended = function() {
            currentIndex++;
            if (currentIndex < playlist.length) {
                loadTrack(currentIndex);
                player.play();
                if (currentState === State.FADING) player.volume = Math.max(0, player.volume);
            } else {
                stopSystem();
            }
        };

        function updateDisplay() {
            const diff = Math.max(0, targetEndTime - Date.now());
            const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timeLeft').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            document.getElementById('trackProgress').innerText = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
            if(playlist[currentIndex]) document.getElementById('fileLabel').innerText = `PLAYING: ${playlist[currentIndex].name}`;
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function seek(seconds) {
            if (!player.src) return;
            player.currentTime = Math.max(0, Math.min(player.duration, player.currentTime + seconds));
            updateDisplay();
        }

        // --- Proxy Logic for Buttons ---
        function armSystemProxy() {
            if (currentState === State.IDLE) armSystem();
            else if (currentState === State.PAUSED) resumeSystem();
        }
        
        function stopSystemProxy() {
            if (currentState === State.PLAYING || currentState === State.FADING) forcePause();
            else if (currentState === State.PAUSED) stopSystem();
        }
    </script>
</body>
</html>

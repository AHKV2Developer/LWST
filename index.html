<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Player | State-Driven</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #d0d0d0; text-align: center; padding: 10px; }
        #status { font-size: 14px; color: #00ff00; margin-bottom: 10px; text-transform: uppercase; }
        #timeLeft { font-size: 40px; font-family: monospace; }
        .main-btn { width: 90%; height: 80px; font-size: 24px; border-radius: 12px; margin: 10px; border: none; cursor: pointer; color: white; background: #1a3a1a; }
        #fileLabel { border: 1px dashed #444; padding: 15px; display: block; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status">IDLE</div>
    <div id="timeLeft">00:00</div>
    <input type="file" id="fileInput" multiple style="display:none" onchange="handleFile(this)">
    <label for="fileInput" id="fileLabel">SELECT FILES</label>
    <button class="main-btn" id="armBtn" onclick="handleEvent('ARM_BUTTON')">ARM</button>

    <script>
        // STATES
        const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', FADING: 'FADING' };
        let currentState = State.IDLE;
        
        // AUDIO & TIMERS
        let player = new Audio();
        let playlist = [];
        let currentIndex = 0;
        let sleepMinutes = 12;
        let masterTimer, fadeInterval, graceTimer, displayInterval, targetEndTime;

        // --- CORE STATE MACHINE (Maps exactly to your table) ---
        function handleEvent(event) {
            console.log(`Event: ${event} | Current State: ${currentState}`);
            
            switch (currentState) {
                case State.IDLE:
                    if (event === 'ARM_BUTTON' || event === 'SHAKE') {
                        if (playlist.length === 0) return alert("Select files.");
                        startAudio();
                        setTimer();
                        transition(State.PLAYING);
                    }
                    break;

                case State.PLAYING:
                    if (event === 'SHAKE') {
                        setTimer(); // Reset Timer -> PLAYING
                    } else if (event === 'FACEDOWN') {
                        pauseAudio();
                        startGraceTimer(); // -> PAUSED
                        transition(State.PAUSED);
                    } else if (event === 'FADE_TIMEOUT') {
                        startFade(); // -> FADING
                        transition(State.FADING);
                    } else if (event === 'TRACK_END') {
                        nextTrack(); // -> PLAYING
                    }
                    break;

                case State.PAUSED:
                    if (event === 'ARM_BUTTON') {
                        resumeAudio();
                        transition(State.PLAYING);
                    } else if (event === 'SHAKE' || event === 'FACEUP') {
                        clearTimeout(graceTimer);
                        resumeAudio();
                        setTimer(); // Reset Timer
                        transition(State.PLAYING);
                    } else if (event === 'GRACE_EXPIRY') {
                        hardStop(); // -> IDLE
                        transition(State.IDLE);
                    }
                    break;

                case State.FADING:
                    if (event === 'ARM_BUTTON') {
                        hardStop(); // -> IDLE
                        transition(State.IDLE);
                    } else if (event === 'SHAKE' || event === 'FACEUP') {
                        cancelFade();
                        resumeAudio();
                        setTimer(); // Reset Timer -> PLAYING
                        transition(State.PLAYING);
                    } else if (event === 'FACEDOWN') {
                        cancelFade();
                        pauseAudio();
                        startGraceTimer(); // -> PAUSED
                        transition(State.PAUSED);
                    } else if (event === 'FADE_COMPLETION') {
                        pauseAudio();
                        transition(State.PAUSED); // Per your table
                    } else if (event === 'TRACK_END') {
                        nextTrack(); // -> PLAYING
                    }
                    break;
            }
        }

        // --- TRANSITION LOGIC ---
        function transition(newState) {
            currentState = newState;
            document.getElementById('status').innerText = currentState;
            const btn = document.getElementById('armBtn');
            if (newState === State.PLAYING || newState === State.FADING) btn.innerText = "PAUSE";
            else if (newState === State.PAUSED) btn.innerText = "RESUME";
            else btn.innerText = "ARM";
        }

        // --- ACTIONS ---
        function startAudio() {
            if (player.src === "") player.src = URL.createObjectURL(playlist[currentIndex]);
            player.play();
        }
        function pauseAudio() { player.pause(); }
        function resumeAudio() { player.play(); }
        function hardStop() { pauseAudio(); player.currentTime = 0; stopAllTimers(); }
        
        function setTimer() {
            clearTimeout(masterTimer);
            targetEndTime = Date.now() + (sleepMinutes * 60 * 1000);
            masterTimer = setTimeout(() => handleEvent('FADE_TIMEOUT'), (sleepMinutes * 60 * 1000) - 30000);
        }

        function startFade() {
            let steps = 30;
            fadeInterval = setInterval(() => {
                steps--;
                player.volume = Math.max(0, steps / 30);
                if (steps <= 0) {
                    clearInterval(fadeInterval);
                    handleEvent('FADE_COMPLETION');
                }
            }, 1000);
        }

        function cancelFade() {
            clearInterval(fadeInterval);
            player.volume = 1.0;
        }

        function startGraceTimer() {
            graceTimer = setTimeout(() => handleEvent('GRACE_EXPIRY'), 5 * 60 * 1000);
        }

        function stopAllTimers() {
            clearTimeout(masterTimer);
            clearTimeout(graceTimer);
            clearInterval(fadeInterval);
        }

        function nextTrack() {
            currentIndex++;
            if (currentIndex < playlist.length) {
                player.src = URL.createObjectURL(playlist[currentIndex]);
                player.play();
            } else {
                handleEvent('ARM_BUTTON'); // Loop back to IDLE
            }
        }

        // --- SENSORS ---
        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (acc.z < -8) handleEvent('FACEDOWN');
            else if (acc.z > 8) handleEvent('FACEUP');
            else if (Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z) > 18) handleEvent('SHAKE');
        });

        player.onended = () => handleEvent('TRACK_END');
        function handleFile(input) { playlist = Array.from(input.files); }
    </script>
</body>
</html>

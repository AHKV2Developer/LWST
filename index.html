<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sleep Player v4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #d0d0d0; text-align: center; padding: 10px; margin: 0; }
        #status { font-size: 13px; color: #888; margin: 5px 0; text-transform: uppercase; }
        #timeLeft { font-size: 48px; font-family: monospace; color: #00ff00; }
        .val { font-size: 40px; font-weight: bold; color: #00ff00; }
        .adj-btn { width: 60px; height: 60px; font-size: 48px; border-radius: 50%; background: #222; color: white; border: 1px solid #444; margin: 5px 15px; }
        #trackProgress { font-size: 18px; font-family: monospace; color: #aaa; margin: 10px 0; }
        .file-label { display: block; width: 90%; margin: 10px auto; padding: 15px; border: 1px dashed #444; border-radius: 12px; cursor: pointer; background: #111; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .action-btn { display: none; width: 90%; height: 75px; font-size: 25px; border-radius: 12px; font-weight: bold; margin: 10px auto; border: none; }
        #armBtn { display: block; background: #1a3a1a; color: white; border: 2px solid #2a5a2a; }
        #stopBtn { background: #500; color: white; }
    </style>
</head>
<body>

    <div id="status">IDLE</div>
    <div id="timeLeft">00:00</div>

    <div style="display: flex; align-items: center; justify-content: center;">
        <button class="adj-btn" onclick="adjustTime(-0.1)">-</button>
        <span id="timeVal" class="val">0.5</span>
        <button class="adj-btn" onclick="adjustTime(0.1)">+</button>
    </div>

    <div id="trackProgress">0:00 / 0:00</div>
    <input type="file" id="fileInput" style="display:none" accept="audio/*" multiple onchange="handleFile(this)">
    <label for="fileInput" class="file-label" id="fileLabel">SELECT FILES</label>
    
    <button id="armBtn" class="action-btn" onclick="armSystem()">ARM</button>
    <button id="stopBtn" class="action-btn" onclick="forcePause()">PAUSE</button>

    <script>
        const State = { IDLE: 'IDLE', PLAYING: 'PLAYING', PAUSED: 'PAUSED', FADING: 'FADING' };
        let currentState = State.IDLE;
        
        let player = new Audio();
        let playlist = [];
        let currentIndex = 0;
        let sleepMinutes = 0.5, targetEndTime, graceTimer, fadeInterval;

        // --- CORE LOGIC ---
        function transitionTo(newState) {
            currentState = newState;
            document.getElementById('status').innerText = newState;
            document.getElementById('armBtn').style.display = (newState === State.IDLE || newState === State.PAUSED) ? 'block' : 'none';
            document.getElementById('stopBtn').style.display = (newState === State.PLAYING || newState === State.FADING) ? 'block' : 'none';
        }

        // Direct Pause Handler
        function forcePause() {
            console.log("Force Pause Triggered");
            player.pause();
            if (currentState !== State.PAUSED) {
                graceTimer = setTimeout(hardStop, 5 * 60 * 1000);
                transitionTo(State.PAUSED);
            }
        }

        function armSystem() {
            if (playlist.length === 0) return alert("Select files.");
            targetEndTime = Date.now() + (sleepMinutes * 60 * 1000);
            player.play();
            transitionTo(State.PLAYING);
        }

        function hardStop() {
            player.pause();
            transitionTo(State.IDLE);
        }

        // --- PLAYLIST LOGIC ---
        player.onended = () => {
            currentIndex++;
            if (currentIndex < playlist.length) {
                player.src = URL.createObjectURL(playlist[currentIndex]);
                player.play();
            } else {
                hardStop();
            }
        };

        function handleFile(input) { 
            playlist = Array.from(input.files); 
            if (playlist.length > 0) {
                currentIndex = 0;
                player.src = URL.createObjectURL(playlist[0]);
                document.getElementById('fileLabel').innerText = playlist[0].name;
            }
        }

        player.onloadedmetadata = () => {
            updateDisplay();
        };

        // --- UI & UPDATES ---
        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s/60), sec = Math.floor(s%60);
            return `${m}:${sec.toString().padStart(2,'0')}`;
        }

        function updateDisplay() {
            if(currentState === State.PLAYING || currentState === State.FADING) {
                const diff = Math.max(0, targetEndTime - Date.now());
                document.getElementById('timeLeft').innerText = `${Math.floor(diff/60000)}:${Math.floor((diff%60000)/1000).toString().padStart(2,'0')}`;
            }
            document.getElementById('trackProgress').innerText = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
        }

        function adjustTime(d) { 
            sleepMinutes = Math.max(0.1, Math.round((sleepMinutes + d)*10)/10); 
            document.getElementById('timeVal').innerText = sleepMinutes; 
        }

        setInterval(updateDisplay, 1000);
        
        // --- SENSORS ---
        window.addEventListener('devicemotion', (e) => {
            const acc = e.accelerationIncludingGravity;
            if (!acc) return;
            if (acc.z < -8 && (currentState === State.PLAYING || currentState === State.FADING)) forcePause();
            else if (acc.z > 8 && currentState === State.PAUSED) {
                clearTimeout(graceTimer);
                player.play();
                transitionTo(State.PLAYING);
            }
        });
    </script>
</body>
</html>
